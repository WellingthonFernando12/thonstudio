<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>THON TOOLKIT V94</title><style>
:root{--line:rgba(255,255,255,.10);--text:#eafff8;--mut:#7fa7a5;--blue:#12a8ff;--green:#35f28f;--bg:#05100f;--panel:#091819;--panel2:#0d2224;--red:#ff5b5b;--yellow:#ffd166}*{box-sizing:border-box;margin:0;padding:0}body{height:100vh;background:radial-gradient(circle at 10% 0,rgba(18,168,255,.22),transparent 30%),radial-gradient(circle at 85% 18%,rgba(53,242,143,.14),transparent 30%),linear-gradient(180deg,#04100f,#071415 60%,#030808);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;overflow:hidden}.app{display:grid;grid-template-columns:260px 1fr;height:100vh}.side{background:rgba(6,16,17,.92);border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:14px;box-shadow:18px 0 60px rgba(0,0,0,.25)}.brand{padding:12px 10px 18px;border-bottom:1px solid var(--line)}.brand h1{font-size:22px;letter-spacing:-.055em}.brand span{background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;color:transparent}.version{display:inline-flex;margin-top:9px;padding:5px 8px;border-radius:999px;border:1px solid rgba(53,242,143,.22);background:rgba(53,242,143,.09);color:var(--green);font-size:11px;font-weight:900;letter-spacing:.08em}.brand p{color:var(--mut);font-size:12px;margin-top:8px;line-height:1.35}.nav{display:grid;gap:8px}.nav button{width:100%;border:1px solid transparent;background:transparent;color:var(--mut);padding:12px 13px;border-radius:14px;text-align:left;font-weight:850;cursor:pointer;font-size:14px}.nav button:hover{background:rgba(255,255,255,.05);color:var(--text)}.nav button.on{background:linear-gradient(135deg,rgba(18,168,255,.20),rgba(53,242,143,.12));border-color:rgba(53,242,143,.25);color:var(--text);box-shadow:0 0 24px rgba(18,168,255,.08)}.hint{margin-top:auto;color:var(--mut);font-size:12px;line-height:1.45;padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.035)}.main{height:100vh}.frame{width:100%;height:100%;border:0;display:block;background:#071011}.status{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.pill{font-size:10px;padding:5px 7px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}@media(max-width:760px){.app{grid-template-columns:1fr}.side{height:auto}.main{height:calc(100vh - 300px)}}
.frameIn{animation:fadeFrame .22s ease-out both}@keyframes fadeFrame{from{opacity:.1;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes navOrb{0%{opacity:0;transform:translateY(-12px) scale(.6)}60%{opacity:.9;transform:translateY(2px) scale(1)}100%{opacity:0;transform:translateY(16px) scale(.8)}}.nav button{position:relative;overflow:hidden;transition:border-color .14s ease,background .14s ease,color .14s ease}.nav button:hover::after{content:"";position:absolute;top:4px;right:16px;width:9px;height:9px;border-radius:50%;background:radial-gradient(circle,rgba(53,242,143,.95),rgba(18,168,255,.45),transparent 72%);animation:navOrb .52s ease-out both}</style></head><body><div class="app"><aside class="side"><div class="brand"><h1>THON <span>TOOLKIT</span></h1><div class="version">V94</div><p>Executar mais. Pensar menos. Tudo local, tudo na mesma base.</p></div><div class="nav"><button class="on" onclick="openTab(this,'/dashboard')">⚡ Dashboard</button><button onclick="openTab(this,'/prospector')">🎯 Prospector</button><button onclick="openTab(this,'/crm')">📋 CRM</button><button onclick="openTab(this,'/downloader')">⬇️ Downloader</button><button onclick="openTab(this,'/trabalhos')">🛠 Trabalhos</button><button onclick="openTab(this,'/pipeline')">📊 Produção V94</button><button onclick="openTab(this,'/projetos')">📁 Projetos</button><button onclick="openTab(this,'/metas')">💰 Metas / MRR</button></div><div class="hint"><b>V94 CRM Trello + Auto Hunt</b><br>Prospector real + CRM em quadro Trello + downloader + projetos com template Premiere e XML automático. Dados em <code>THON_TOOLKIT_APP/thon_data/</code>.<div class="status"><span class="pill">local</span><span class="pill">json</span><span class="pill">blue/green</span></div></div></aside><main class="main" id="main"><iframe class="frame" src="/dashboard"></iframe></main></div><script>function mark(b){document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}function openTab(b,url){mark(b);document.getElementById('main').innerHTML='<iframe class="frame frameIn" src="'+url+'"></iframe>'}</script>
<script src="/static/thon_full_nav.js"></script>

</body></html>
