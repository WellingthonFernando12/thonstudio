<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Trabalhos v92.3</title><link rel="stylesheet" href="/_base.css"><style>.jobs{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}.job{border-left:5px solid var(--green)}.job h3{margin-bottom:6px}.progress{height:12px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin:10px 0}.progress div{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:999px}.modal{position:fixed;right:22px;top:22px;width:min(460px,calc(100vw - 44px));background:#0b1819;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 24px 90px rgba(0,0,0,.5);display:none;z-index:10}.cols2{display:grid;grid-template-columns:1fr 1fr;gap:10px}</style></head><body><div class="top"><div><h1>Trabalhos Ativos v92.3</h1><p class="sub">Aqui fica entrega. CRM fica venda. Cada coisa no seu quadrado, graças a Deus.</p></div><button class="primary" onclick="newJob()">+ Novo trabalho</button></div><div class="stats" id="stats"></div><div class="jobs" id="jobs"></div><div class="modal" id="modal"><h2 id="mtitle">Trabalho</h2><div id="form"></div></div><script>
let data={}, current=null;async function api(u,o){return fetch(u,o).then(r=>r.json())}function money(n){return 'R$ '+Number(n||0).toLocaleString('pt-BR',{maximumFractionDigits:0})}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function pct(a,b){return b?Math.min(100,Math.round(a/b*100)):0}function minfmt(m){m=Number(m||0);return Math.floor(m/60)+'h '+Math.round(m%60)+'m'}
async function load(){data=await api('/api/trabalhos');render()}function render(){const s=data.stats||{};stats.innerHTML=`<div class="stat"><span>Ativos</span><strong>${s.ativos||0}</strong></div><div class="stat"><span>Vídeos</span><strong>${s.entregues||0}/${s.videos||0}</strong></div><div class="stat"><span>Tempo</span><strong>${s.horas||0}h</strong></div><div class="stat"><span>Valor</span><strong>${money(s.receita||0)}</strong></div>`;jobs.innerHTML=(data.trabalhos||[]).map(job).join('')||'<div class="card"><h2>Nenhum trabalho ativo</h2><p>Cria pelo CRM ou manualmente aqui.</p></div>'}
function job(t){const p=pct(t.entregues||0,t.qtd_videos||0), running=!!t.timer_inicio;return `<div class="card job" style="border-left-color:${t.cor||'#35f28f'}"><h3>${esc(t.cliente)}</h3><p>${esc(t.titulo)} • Prazo: <b>${esc(t.prazo||'sem prazo')}</b></p><div class="progress"><div style="width:${p}%"></div></div><p><b>${t.entregues||0}/${t.qtd_videos||0}</b> vídeos • ${minfmt(t.minutos)} • ${money(t.valor)}</p><div class="row"><button class="primary" onclick="edit('${t.id}')">Editar</button><button onclick="timer('${t.id}','${running?'pause':'start'}')">${running?'Pausar':'Cronometrar'}</button><button onclick="quickPlus('${t.id}')">+1 entregue</button></div></div>`}
async function timer(id,action){await api('/api/trabalhos/timer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,action})});load()}async function quickPlus(id){let t=data.trabalhos.find(x=>x.id===id);await api('/api/trabalhos/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,entregues:Math.min((+t.entregues||0)+1,+t.qtd_videos||9999)})});load()}
function fields(t={}){form.innerHTML=`<div class="field"><label>Cliente</label><input id="cliente" value="${esc(t.cliente||'')}"></div><div class="field"><label>Trabalho</label><input id="titulo" value="${esc(t.titulo||'Pacote de vídeos')}"></div><div class="cols2"><div class="field"><label>Qtd vídeos</label><input id="qtd" type="number" value="${t.qtd_videos||0}"></div><div class="field"><label>Entregues</label><input id="ent" type="number" value="${t.entregues||0}"></div></div><div class="cols2"><div class="field"><label>Valor</label><input id="valor" type="number" value="${t.valor||0}"></div><div class="field"><label>Prazo</label><input id="prazo" value="${esc(t.prazo||'')}"></div></div><div class="field"><label>Observações</label><textarea id="obs" rows="4">${esc(t.observacoes||'')}</textarea></div><div class="row"><button class="primary" onclick="save()">Salvar</button><button onclick="modal.style.display='none'">Fechar</button></div>`}
function newJob(){current=null;mtitle.textContent='Novo trabalho';modal.style.display='block';fields({})}function edit(id){current=data.trabalhos.find(t=>t.id===id);mtitle.textContent='Editar trabalho';modal.style.display='block';fields(current)}async function save(){const payload={cliente:cliente.value,titulo:titulo.value,qtd_videos:+qtd.value||0,entregues:+ent.value||0,valor:+valor.value||0,prazo:prazo.value,observacoes:obs.value};if(current){payload.id=current.id;await api('/api/trabalhos/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})}else{await api('/api/trabalhos/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})}modal.style.display='none';load()}load();setInterval(load,10000);
</script><script src="/static/thon_full_nav.js"></script>
</body></html>
