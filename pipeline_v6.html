<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pipeline Editor v92.3</title><style>
:root{--bg:#07080c;--c:#151722;--c2:#202334;--t:#f5f5f7;--m:#9b9ca8;--l:rgba(255,255,255,.1);--b:#0a84ff;--g:#30d158;--r:#ff453a;--p:#bf5af2}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(circle at 20% 5%,rgba(10,132,255,.25),transparent 30%),linear-gradient(180deg,#07080c,#10111a);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:22px}
.app{max-width:1180px;margin:auto}.top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}h1{font-size:36px;letter-spacing:-.06em}.sub{color:var(--m);margin-top:6px}
button{border:0;border-radius:999px;padding:11px 15px;font-weight:900;cursor:pointer;color:white;background:rgba(255,255,255,.09)}button:hover{filter:brightness(1.12)}.primary{background:var(--b)}.green{background:var(--g);color:#071207}.danger{background:rgba(255,69,58,.18);color:#ffaaa5}.purple{background:rgba(191,90,242,.2);color:#e7beff}
.grid{display:grid;grid-template-columns:310px 1fr 300px;gap:14px}.panel{background:rgba(21,23,34,.94);border:1px solid var(--l);border-radius:26px;overflow:hidden;box-shadow:0 26px 80px rgba(0,0,0,.35)}.head{padding:15px;border-bottom:1px solid var(--l)}.head small{display:block;color:var(--m);margin-top:3px}.body{padding:14px}
.list{display:grid;gap:8px;max-height:75vh;overflow:auto}.item{background:transparent;border:1px solid transparent;border-radius:18px;padding:13px;text-align:left;width:100%}.item.active{background:linear-gradient(135deg,rgba(10,132,255,.2),rgba(191,90,242,.08));border-color:rgba(10,132,255,.35)}.item strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}.meta{font-size:12px;color:var(--m);line-height:1.45}
.title{width:100%;background:transparent;border:0;color:white;font-size:29px;font-weight:950;letter-spacing:-.05em;margin-bottom:12px;outline:0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}.stat{background:var(--c2);border:1px solid var(--l);border-radius:18px;padding:13px}.stat span{display:block;color:var(--m);font-size:10px;font-weight:900;text-transform:uppercase;margin-bottom:7px}.stat strong{font-size:20px;font-variant-numeric:tabular-nums}
.box{background:var(--c2);border:1px solid var(--l);border-radius:20px;padding:14px;margin-bottom:12px}.current{background:linear-gradient(135deg,rgba(10,132,255,.23),rgba(191,90,242,.15));border-color:rgba(10,132,255,.3)}.current small{color:#b8d9ff;font-size:11px;font-weight:900;text-transform:uppercase}.current h2{font-size:25px;letter-spacing:-.04em;margin-top:8px}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
.bar{height:11px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;background:linear-gradient(90deg,var(--b),var(--p));transition:.25s}
.step{display:grid;grid-template-columns:32px 1fr 34px;gap:9px;align-items:center;background:var(--c2);border:1px solid var(--l);border-radius:16px;padding:10px;margin-bottom:8px}.step.now{border-color:rgba(10,132,255,.55);box-shadow:0 0 0 4px rgba(10,132,255,.08)}.step.done{opacity:.55}.check{width:27px;height:27px;border-radius:9px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;cursor:pointer}.done .check{background:var(--g);color:#071207;font-weight:900}
textarea,input,select{width:100%;border:1px solid var(--l);background:var(--c2);color:white;border-radius:15px;padding:12px;font:inherit;outline:0}textarea{background:transparent;border:0;padding:0;resize:vertical;min-height:38px}.icon{padding:0;width:33px;height:33px;border-radius:12px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:18px}.modal{width:min(500px,100%);background:#151722;border:1px solid var(--l);border-radius:26px;padding:20px}.modal h2{font-size:26px;letter-spacing:-.04em;margin-bottom:8px}.modal p,.side p{color:var(--m);font-size:13px;line-height:1.45;margin-bottom:10px}.field{margin-bottom:11px}.field label{display:block;color:var(--m);font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:6px}.empty{text-align:center;color:var(--m);padding:34px 12px}.empty h2{color:white;margin-bottom:7px}.report{white-space:pre-wrap;background:#0f1017;border:1px solid var(--l);border-radius:16px;padding:12px;font-size:12px;line-height:1.45;color:#ddd}
@media(max-width:1000px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){body{padding:14px}.stats{grid-template-columns:1fr}h1{font-size:30px}}
</style></head><body><div class="app"><div class="top"><div><h1>Pipeline Editor v92.3</h1><p class="sub">Medição de produção por lote com presets e processo fordista.</p></div><button class="primary" onclick="showNew()">+ Novo lote</button></div><div class="grid"><aside class="panel"><div class="head"><strong>Lotes</strong><small>histórico local</small></div><div class="body list" id="list"></div></aside><main class="panel"><div class="body" id="main"></div></main><aside class="panel"><div class="head"><strong>Diagnóstico</strong><small>métrica real</small></div><div class="body side" id="side"></div></aside></div></div>
<div id="modal" class="overlay"><div class="modal"><h2>Novo lote</h2><p>Escolhe o tipo, quantidade de vídeos e mede a operação.</p><div class="field"><label>Nome</label><input id="newName" placeholder="Ex: Podcast X - 10 cortes"></div><div class="field"><label>Preset</label><select id="preset"></select></div><div class="field"><label>Quantidade</label><input id="qty" type="number" min="1" value="10"></div><div class="row"><button onclick="hideNew()">Cancelar</button><button class="primary" onclick="createBatch()">Criar</button></div></div></div>
<script>
const KEY="pe_v923";
const P={pod:{n:"Cortes de Podcast",m:35,s:["Download/importação","Gerar transcrição","Mineração dos trechos","Separar/demarcar cortes","Corte bruto","Remover silêncio/lixo","Ajustar pacing","Correção da legenda","Color grade","B-roll/imagens","Motion/hooks visuais","Transições","SFX","Música","Revisão","Exportar"]},yt:{n:"Vídeo Longo YouTube",m:240,s:["Organizar arquivos","Importar/sincronizar","Montagem bruta","Cortar erros/silêncios","Estrutura narrativa","Refinar ritmo","Capítulos/blocos","Color grade","Áudio","B-roll/imagens","Motion pontual","SFX/música","Revisão completa","Exportar"]},social:{n:"Conteúdo Digital/Social",m:25,s:["Importar material","Selecionar take","Corte bruto","Remover pausas","Hook visual","Legenda","Reframe/crop","B-roll simples","Motion leve","SFX","Música","Revisão","Exportar"]},ads:{n:"Anúncio/Criativo Pago",m:55,s:["Entender oferta","Selecionar take","Montagem bruta","Cortar excesso","Hook agressivo","Benefício/prova visual","Legenda persuasiva","B-roll/produto","Motion de oferta","CTA final","SFX","Música","Revisão clareza","Exportar"]},cap:{n:"Legenda + Corte Simples",m:12,s:["Importar","Corte bruto","Remover pausas","Gerar legenda","Corrigir legenda","Ajustar layout","Revisar","Exportar"]}};
let st=JSON.parse(localStorage.getItem(KEY))||{a:null,b:[]},timer=null;
function save(){localStorage.setItem(KEY,JSON.stringify(st))}function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}function A(){return st.b.find(x=>x.id===st.a)||null}function E(t){return String(t).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function showNew(){document.getElementById("modal").style.display="flex"}function hideNew(){document.getElementById("modal").style.display="none"}
function createBatch(){let k=preset.value,o=P[k],q=Math.max(1,+qty.value||1),name=newName.value.trim()||o.n;let b={id:id(),name,preset:k,pn:o.n,q,tm:o.m,sec:0,run:false,last:null,cur:0,steps:o.s.map(t=>({t,d:false}))};st.b.unshift(b);st.a=b.id;hideNew();render()}
function tick(){let b=A();if(!b||!b.run||!b.last)return;let n=Date.now();b.sec+=Math.floor((n-b.last)/1000);b.last=n;save()}
function start(){let b=A();if(!b)return;b.run=true;b.last=Date.now();clearInterval(timer);timer=setInterval(()=>{tick();rStats();rList();rSide()},1000);render()}
function pause(){tick();let b=A();if(!b)return;b.run=false;b.last=null;clearInterval(timer);render()}
function next(){tick();let b=A();if(!b)return;b.steps[b.cur].d=true;if(b.cur<b.steps.length-1)b.cur++;else{b.run=false;b.last=null;clearInterval(timer)}render()}
function prev(){let b=A();if(!b)return;if(b.cur>0){b.steps[b.cur].d=false;b.cur--;b.steps[b.cur].d=false}render()}
function tog(i){let b=A();b.steps[i].d=!b.steps[i].d;let f=b.steps.findIndex(s=>!s.d);b.cur=f<0?b.steps.length-1:f;render()}function upd(i,v){A().steps[i].t=v;save()}function del(){let b=A();if(!b)return;if(!confirm("Apagar lote?"))return;st.b=st.b.filter(x=>x.id!==b.id);st.a=st.b[0]?.id||null;render()}function addStep(){A().steps.push({t:"Nova etapa",d:false});render()}
function fmt(s){let h=String(Math.floor(s/3600)).padStart(2,"0"),m=String(Math.floor((s%3600)/60)).padStart(2,"0"),x=String(s%60).padStart(2,"0");return h+":"+m+":"+x}function done(b){return b.steps.filter(s=>s.d).length}function prog(b){return Math.round(done(b)/b.steps.length*100)}function avg(b){return b.sec?((b.sec/60)/b.q).toFixed(1)+"m":"--"}function vph(b){return b.sec?((b.q/b.sec)*3600).toFixed(1):"--"}function diag(b){if(!b.sec)return"Sem dados ainda.";let a=(b.sec/60)/b.q;if(a<=b.tm*.8)return"Acima da meta. Fluxo forte.";if(a<=b.tm)return"Dentro da meta.";if(a<=b.tm*1.25)return"Levemente lento. Procura gargalo.";return"Lento. Tem etapa comendo tempo ou preciosismo demais."}
function report(b){return`RELATÓRIO\nLote: ${b.name}\nTipo: ${b.pn}\nQtd: ${b.q}\nTempo: ${fmt(b.sec)}\nMédia/vídeo: ${avg(b)}\nVídeos/hora: ${vph(b)}\nMeta: ${b.tm}m/vídeo\nProgresso: ${prog(b)}%\nDiagnóstico: ${diag(b)}`}
function rList(){let el=list;if(!st.b.length){el.innerHTML='<div class="empty"><h2>Nenhum lote</h2><p>Cria um lote.</p></div>';return}el.innerHTML=st.b.map(b=>`<button class="item ${b.id===st.a?'active':''}" onclick="tick();st.a='${b.id}';render()"><strong>${E(b.name)}</strong><div class="meta">${E(b.pn)} • ${b.q} vídeos<br>${prog(b)}% • ${fmt(b.sec)} • ${avg(b)}/vídeo</div></button>`).join("")}
function rStats(){let b=A(),el=document.getElementById("stats");if(!b||!el)return;el.innerHTML=`<div class="stat"><span>Tempo</span><strong>${fmt(b.sec)}</strong></div><div class="stat"><span>Vídeos</span><strong>${b.q}</strong></div><div class="stat"><span>Média</span><strong>${avg(b)}</strong></div><div class="stat"><span>Vídeos/h</span><strong>${vph(b)}</strong></div>`;let f=document.getElementById("fill");if(f)f.style.width=prog(b)+"%"}
function rMain(){let b=A(),el=main;if(!b){el.innerHTML='<div class="empty"><h2>Cria um lote</h2><p>O foco é medir produção em escala.</p></div>';return}let fin=done(b)===b.steps.length;el.innerHTML=`<input class="title" value="${E(b.name)}" oninput="A().name=this.value;save();rList();rSide()"><div class="stats" id="stats"></div><div class="box"><strong>${done(b)}/${b.steps.length} etapas • ${prog(b)}%</strong><div class="bar"><div class="fill" id="fill" style="width:${prog(b)}%"></div></div></div><div class="box current"><small>${E(b.pn)} • meta ${b.tm}m/vídeo</small><h2>${fin?'Lote finalizado':E(b.steps[b.cur]?.t||'Finalizado')}</h2><div class="row">${b.run?'<button class="danger" onclick="pause()">Pausar</button>':'<button class="green" onclick="start()">Iniciar</button>'}<button class="primary" onclick="next()">Próximo →</button><button onclick="prev()">← Voltar</button><button class="purple" onclick="addStep()">+ Etapa</button><button class="danger" onclick="del()">Apagar</button></div></div><div class="box"><div class="field"><label>Quantidade</label><input type="number" min="1" value="${b.q}" onchange="A().q=Math.max(1,+this.value||1);render()"></div></div>${b.steps.map((s,i)=>`<div class="step ${s.d?'done':''} ${i===b.cur&&!fin?'now':''}"><div class="check" onclick="tog(${i})">${s.d?'✓':''}</div><textarea oninput="upd(${i},this.value)">${E(s.t)}</textarea><button class="icon" onclick="A().steps.splice(${i},1);render()">×</button></div>`).join("")}`;rStats()}
function rSide(){let b=A(),el=side;if(!b){el.innerHTML='<div class="empty"><p>Sem lote.</p></div>';return}let best=[...st.b].filter(x=>x.sec>0).sort((a,b)=>(b.q/b.sec)-(a.q/a.sec)).slice(0,3);el.innerHTML=`<div class="box"><strong>Diagnóstico</strong><p>${diag(b)}</p></div><div class="box"><strong>Ranking local</strong>${best.length?best.map((x,i)=>`<p>#${i+1} ${E(x.name)}<br><span class="meta">${vph(x)} vídeos/h • ${avg(x)}/vídeo</span></p>`).join(""):"<p>Sem dados.</p>"}</div><div class="box"><strong>Relatório</strong><div class="report" id="rep">${E(report(b))}</div><div class="row"><button class="primary" onclick="navigator.clipboard.writeText(report(A()));alert('Copiado')">Copiar</button></div></div>`}
function render(){rList();rMain();rSide();save()}preset.innerHTML=Object.entries(P).map(([k,o])=>`<option value="${k}">${o.n} • ${o.m}m/vídeo</option>`).join("");document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"){tick();render()}});window.addEventListener("beforeunload",tick);render();
</script><script src="/static/thon_full_nav.js"></script>
</body></html>
