<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Instagram Prospector — THON Toolkit v89</title>
<style>
:root{--bg:#050909;--panel:#0b1717;--panel2:#102222;--line:rgba(255,255,255,.1);--text:#ecfff8;--mut:#88aaa5;--green:#35f28f;--blue:#12a8ff;--pink:#f472b6;--red:#ff6464;--yellow:#ffd166}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,rgba(244,114,182,.16),transparent 28%),radial-gradient(circle at 85% 8%,rgba(18,168,255,.14),transparent 30%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:1180px;margin:auto;padding:34px 20px}.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px}.eyebrow{font:700 11px ui-monospace,monospace;letter-spacing:.13em;color:var(--pink);text-transform:uppercase}h1{font-size:38px;letter-spacing:-.05em;margin:5px 0}.sub{color:var(--mut);margin:0}.version{padding:7px 10px;border:1px solid rgba(244,114,182,.3);border-radius:999px;color:var(--pink);font:700 11px ui-monospace,monospace}.card{background:linear-gradient(180deg,rgba(16,34,34,.96),rgba(9,22,22,.96));border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.22);margin-bottom:15px}.search{display:grid;grid-template-columns:1fr 120px 210px;gap:10px}input,button{font:inherit;border-radius:12px;border:1px solid var(--line)}input{padding:13px 14px;background:#071111;color:var(--text);outline:none}input:focus{border-color:var(--pink)}button{padding:11px 14px;background:rgba(255,255,255,.05);color:var(--text);font-weight:800;cursor:pointer}button:hover{border-color:rgba(255,255,255,.25)}button.primary{background:linear-gradient(135deg,var(--pink),#9d5cff);color:#100713;border:0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tabs button.on{color:var(--pink);border-color:var(--pink);background:rgba(244,114,182,.1)}.status{display:none;color:var(--mut);font:12px ui-monospace,monospace;margin-top:12px}.status.show{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}.lead{padding:15px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.035)}.leadTop{display:flex;justify-content:space-between;gap:12px}.handle{color:var(--pink);font:700 12px ui-monospace,monospace}.score{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:rgba(53,242,143,.09);color:var(--green);font-weight:950}.lead h3{margin:4px 0 7px}.bio{color:#cae2dd;font-size:13px;line-height:1.45;min-height:57px}.meta,.reasons{color:var(--mut);font-size:12px;line-height:1.5}.actions{display:flex;gap:7px;margin-top:12px}.actions button{flex:1;padding:8px}.approve{color:var(--green);border-color:rgba(53,242,143,.3)}.reject{color:var(--red);border-color:rgba(255,100,100,.3)}a{color:var(--blue);text-decoration:none}.empty{text-align:center;color:var(--mut);padding:50px 10px}.summary{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}.pill{padding:7px 10px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;color:var(--mut);font-size:12px}@media(max-width:700px){.search{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}h1{font-size:30px}}
</style>
</head>
<body><div class="wrap">
  <header class="top"><div><div class="eyebrow">// módulo independente</div><h1>Instagram Prospector</h1><p class="sub">Perfis públicos, score local e CRM isolado do YouTube.</p></div><span class="version">THON v89</span></header>
  <section class="card"><div class="search"><input id="keyword" placeholder="Ex.: marketing, podcast, dentista São Paulo" onkeydown="if(event.key==='Enter')searchProfiles()"><input id="limit" type="number" min="1" max="50" value="20"><button class="primary" onclick="searchProfiles()">Buscar no Instagram</button></div><div class="status" id="status"></div></section>
  <nav class="tabs"><button class="on" data-view="pending" onclick="setView('pending',this)">Pendentes</button><button data-view="approved" onclick="setView('approved',this)">Aprovados</button><button data-view="rejected" onclick="setView('rejected',this)">Reprovados recentes</button></nav>
  <div class="summary" id="summary"></div><main class="grid" id="grid"></main>
</div>
<script>
const API=window.location.origin,DECISION_ENDPOINTS={approve:'/api/instagram/approve',reject:'/api/instagram/reject'};let view='pending',pending=[],visible=[];
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function message(text,error=false){status.textContent=text;status.className='status show';status.style.color=error?'var(--red)':'var(--mut)'}
function setView(next,button){view=next;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b===button));loadView()}
async function searchProfiles(){const word=keyword.value.trim();if(!word)return message('Digite uma palavra-chave.',true);message('Buscando perfis públicos e calculando score…');const response=await fetch(`${API}/api/instagram/search`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:word,limit:Number(limit.value)||20})});const data=await response.json();if(!response.ok)return message(data.error||'Busca indisponível.',true);pending=[...pending,...(data.leads||[])].filter((lead,index,all)=>all.findIndex(item=>item.id===lead.id)===index).slice(0,50);message(`${data.total} leads gerados${data.errors?.length?` · ${data.errors.length} perfis ignorados`:''}.`);view='pending';document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.view==='pending'));render(pending)}
async function loadView(){if(view==='pending'){const data=await fetch(`${API}/api/instagram/pending`).then(r=>r.json());pending=data.leads||[];return render(pending.slice(0,50))}const endpoint=view==='approved'?'crm':'rejected';const data=await fetch(`${API}/api/instagram/${endpoint}?limit=50`).then(r=>r.json());render((data.leads||[]).slice(0,50),data.total)}
function render(leads,total=leads.length){visible=leads;summary.innerHTML=`<span class="pill">${total} ${view==='pending'?'pendentes':view==='approved'?'aprovados':'reprovados no histórico'}</span><span class="pill">${leads.length} renderizados</span>`;grid.innerHTML=leads.length?leads.map(card).join(''):`<div class="empty">Nenhum lead nesta visualização.</div>`}
function card(lead){const decisions=view==='pending'?`<div class="actions"><button class="approve" onclick="decide('${esc(lead.id)}','approve')">Aprovar</button><button class="reject" onclick="decide('${esc(lead.id)}','reject')">Reprovar</button></div>`:'';return `<article class="lead" id="lead-${esc(lead.id).replace(/[^a-z0-9_-]/gi,'-')}"><div class="leadTop"><div><span class="handle">@${esc(lead.username)}</span><h3>${esc(lead.display_name||lead.username)}</h3></div><div class="score">${lead.score||0}</div></div><div class="bio">${esc(lead.bio||'Sem bio pública disponível.')}</div><div class="meta">${Number(lead.followers||0).toLocaleString('pt-BR')} seguidores · ${lead.posts_count||0} posts · ${(lead.recent_reels||[]).length} reels<br>${lead.email?`✉ ${esc(lead.email)} · `:''}<a href="${esc(lead.profile_url)}" target="_blank">Abrir perfil ↗</a></div><div class="reasons">${esc((lead.score_reasons||[]).slice(0,3).join(' · '))}</div>${decisions}</article>`}
async function decide(id,action){const response=await fetch(`${API}${DECISION_ENDPOINTS[action]}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});const data=await response.json();if(!response.ok)return message(data.error||'Decisão não salva.',true);pending=pending.filter(lead=>lead.id!==id);render(pending);message(action==='approve'?'Lead aprovado e salvo no CRM.':'Lead reprovado, salvo e removido da tela.')}
loadView();
</script></body></html>
