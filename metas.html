<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Metas v92.3</title><link rel="stylesheet" href="/_base.css"><style>.layout{display:grid;grid-template-columns:340px 1fr;gap:14px}.big{font-size:42px;letter-spacing:-.06em;font-weight:950}</style></head><body><div class="top"><div><h1>Metas / MRR v92.3</h1><p class="sub">Meta financeira, recorrência e execução semanal.</p></div><button class="primary" onclick="save()">Salvar metas</button></div><div class="stats" id="stats"></div><div class="layout" style="margin-top:14px"><div class="card"><div class="field"><label>Meta mensal</label><input id="meta_mensal" type="number"></div><div class="field"><label>Ticket médio</label><input id="ticket_medio" type="number" value="800"></div><div class="field"><label>Meta DMs/semana</label><input id="meta_dms_semana" type="number"></div><div class="field"><label>Meta vídeos/semana</label><input id="meta_videos_semana" type="number"></div><button class="primary" onclick="save()">Salvar</button></div><div class="card"><h2>Simulador</h2><p style="margin-top:10px">Clientes necessários para bater a meta:</p><div class="big" id="clientesNec">--</div><p class="mut">Calculado por meta restante ÷ ticket médio.</p></div></div><script>
async function api(u,o){return fetch(u,o).then(r=>r.json())}function money(n){return 'R$ '+Number(n||0).toLocaleString('pt-BR',{maximumFractionDigits:0})}
async function load(){const d=await api('/api/metas');meta_mensal.value=d.meta_mensal||10000;ticket_medio.value=d.ticket_medio||800;meta_dms_semana.value=d.meta_dms_semana||75;meta_videos_semana.value=d.meta_videos_semana||10;stats.innerHTML=`<div class="stat"><span>MRR atual</span><strong>${money(d.mrr_atual)}</strong></div><div class="stat"><span>Meta</span><strong>${money(d.meta_mensal)}</strong></div><div class="stat"><span>Faltam</span><strong>${money(d.faltam)}</strong></div><div class="stat"><span>Clientes ativos</span><strong>${d.clientes_ativos||0}</strong></div>`;clientesNec.textContent=Math.ceil((d.faltam||0)/(d.ticket_medio||800))}
async function save(){await api('/api/metas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({meta_mensal:meta_mensal.value,ticket_medio:ticket_medio.value,meta_dms_semana:meta_dms_semana.value,meta_videos_semana:meta_videos_semana.value})});load()}load();
</script><script src="/static/thon_full_nav.js"></script>
</body></html>
