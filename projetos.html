<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Projetos v92.3</title><link rel="stylesheet" href="/_base.css"><style>.layout{display:grid;grid-template-columns:360px 1fr;gap:14px}.project{padding:13px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.045);margin-bottom:9px}.project b{display:block}.project small{color:var(--mut);display:block;margin-top:5px;word-break:break-all}.ok{color:var(--green);font-weight:900}.mini{font-size:12px;color:var(--mut);line-height:1.45;margin-top:8px}.seqs{margin-top:8px;padding:9px;border-radius:12px;background:rgba(30,232,138,.06);font-size:12px;color:#c9fff0;max-height:120px;overflow:auto}@media(max-width:900px){.layout{grid-template-columns:1fr}}</style></head><body><div class="top"><div><h1>Projetos v92.3</h1><p class="sub">Cria projeto em Downloads/Projetos Toolkit e gera UM XML único com todas as sequências.</p></div><button class="primary" onclick="createProject()">Criar projeto</button></div><div class="layout"><div class="card"><div class="field"><label>Cliente</label><input id="cliente" placeholder="João do Açougue"></div><div class="field"><label>Estilo / Tipo de vídeo</label><select id="tipo"><option value="REELS">Reels</option><option value="SHORTS">Shorts</option><option value="PODCAST">Podcast</option><option value="VSL">VSL</option><option value="YOUTUBE">YouTube Longo</option><option value="CURSO">Curso/Aula</option></select></div><div class="field"><label>Ano</label><input id="ano" value="2026"></div><div class="field"><label>Quantidade de vídeos/sequências</label><input id="qtd_xml" type="number" min="1" max="200" value="18"></div><div class="field"><label>Pasta base</label><input id="base" placeholder="vazio = ~/Downloads/Projetos Toolkit"></div><button class="primary" onclick="createProject()">Criar projeto + XML único</button><p class="mini">Nome das sequências: <b>CLIENTE_TIPO_01</b>, <b>CLIENTE_TIPO_02</b>...<br>Saída padrão: <b>Downloads/Projetos Toolkit</b>.</p></div><div class="card"><h2>Projetos criados</h2><div id="list" style="margin-top:12px"></div></div></div><script>
async function api(u,o){return fetch(u,o).then(r=>r.json())}function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
async function load(){const d=await api('/api/projetos');list.innerHTML=(d.projetos||[]).map(p=>`<div class="project"><b>${esc(p.nome||p.cliente)}</b><small>Pasta: ${esc(p.pasta)}</small><small>Premiere: ${esc(p.premiere)}</small><small>XML único: ${esc((p.xmls||[])[0]||'')}</small><small class="ok">${esc(p.quantidade||((p.sequencias||[]).length))} sequências no XML</small>${(p.sequencias||[]).length?`<div class="seqs">${(p.sequencias||[]).map(esc).join('<br>')}</div>`:''}</div>`).join('')||'<p>Nenhum projeto criado ainda.</p>'}
async function createProject(){const payload={cliente:cliente.value,tipo:tipo.value,ano:ano.value,base_path:base.value,qtd_xml:qtd_xml.value};const r=await api('/api/projetos/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(r.ok){load()}else alert('Erro ao criar projeto')}
load();
</script><script src="/static/thon_full_nav.js"></script>
</body></html>
